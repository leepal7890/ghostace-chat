<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AÜRÖ | COMMANDER OS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --neon: #00d2ff; --bg: #000814; --danger: #ff4757; }
        body { margin: 0; height: 100vh; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; }

        /* 🌊 Signature Moving Wave */
        .ocean { position: absolute; bottom: 0; width: 100%; height: 150px; overflow: hidden; z-index: -1; pointer-events: none; }
        .wave {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%2300d2ff" fill-opacity="0.15" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,250.7C960,235,1056,181,1152,165.3C1248,149,1344,171,1392,181.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: 50% 100%; animation: move 10s linear infinite;
        }
        @keyframes move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .screen { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex; }

        /* Login Card */
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 40px; 
            backdrop-filter: blur(25px); border: 1px solid rgba(0, 210, 255, 0.3);
            width: 100%; max-width: 380px; text-align: center;
        }

        /* App Icon/Logo Style */
        .app-logo {
            width: 100px; height: 100px; border-radius: 25px; margin-bottom: 20px;
            object-fit: cover; border: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon);
        }

        /* Chat UI */
        #chat-scr { justify-content: flex-start; padding: 0; }
        .header { width: 100%; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon); display: flex; align-items: center; justify-content: space-between; }
        #msg-flow { flex: 1; overflow-y: auto; width: 100%; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 14px; position: relative; }
        .sent { background: linear-gradient(135deg, #00d2ff, #007bff); align-self: flex-end; border-bottom-right-radius: 2px; }
        .recv { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 2px; }

        .btn-block { color: var(--danger); font-size: 18px; cursor: pointer; }

        .input-bar { padding: 12px; background: #000; display: flex; gap: 10px; border-top: 1px solid rgba(0,210,255,0.2); }
        .msg-box { flex: 1; background: transparent; border: 1px solid var(--neon); border-radius: 25px; color: white; padding: 8px 18px; outline: none; }
        .action-btn { font-size: 26px; color: var(--neon); cursor: pointer; }
    </style>
</head>
<body>

<div class="ocean"><div class="wave"></div></div>

<div id="login-scr" class="screen active">
    <div class="glass-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="app-logo" alt="App Icon">
        <h2 style="color: var(--neon); font-weight: 900;">AÜRÖ CHAT</h2>
        <p class="small text-white-50 mb-4">ULTRA SECURE CONNECTION</p>
        <input type="text" id="uName" class="form-control bg-transparent text-white border-info rounded-pill mb-3" placeholder="Display Name">
        <input type="tel" id="uPh" class="form-control bg-transparent text-white border-info rounded-pill mb-4" placeholder="Phone Number">
        <button class="btn btn-info w-100 rounded-pill py-2 fw-bold" onclick="startApp()">LAUNCH APP</button>
    </div>
</div>

<div id="wait-scr" class="screen">
    <div class="glass-card">
        <div class="spinner-border text-info mb-4"></div>
        <h4>SYSTEM AUTH...</h4>
        <p class="text-white-50">Waiting for Admin approval.</p>
    </div>
</div>

<div id="chat-scr" class="screen">
    <div id="admin-notify" style="position:fixed; top:70px; width:90%; z-index:100;"></div>
    <div class="header">
        <div class="d-flex align-items-center">
            <div id="pfp" class="rounded-circle d-flex align-items-center justify-content-center fw-bold me-2" style="width:35px; height:35px; background: var(--neon); color: black;">?</div>
            <h6 class="mb-0 fw-bold">AÜRÖ CREW</h6>
        </div>
        <i class="bi bi-shield-lock-fill text-info fs-4"></i>
    </div>
    
    <div id="msg-flow"></div>
    
    <div class="input-bar">
        <label class="action-btn"><i class="bi bi-image"></i><input type="file" hidden accept="image/*" onchange="sendImg(this)"></label>
        <input type="text" id="msg-in" class="msg-box" placeholder="Message..." onkeypress="if(event.key==='Enter') sendTxt()">
        <div class="action-btn" onclick="sendTxt()"><i class="bi bi-send-fill"></i></div>
    </div>
</div>

<div id="block-scr" class="screen">
    <div class="glass-card" style="border-color: var(--danger);">
        <i class="bi bi-slash-circle text-danger" style="font-size: 50px;"></i>
        <h2 class="text-danger mt-3">BLOCKED</h2>
        <p>Access denied by Commander.</p>
    </div>
</div>

<script>
    const ADMIN_PH = "09672264454";
    let myName = "", myPhone = "", isAdmin = false;
    let blocked = localStorage.getItem('auro_block') === 'true';

    const ably = new Ably.Realtime({ key: 'Nt4BVQ.HoIzUA:eXv4-B4_uJx-0PmEN1WDOQ4KMjreeEUe2_G6F5VObd8' });
    const channel = ably.channels.get('auro_v10_final');

    if(blocked) switchScr('block-scr');

    function switchScr(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startApp() {
        myName = document.getElementById('uName').value.trim();
        myPhone = document.getElementById('uPh').value.trim();
        if(!myName || !myPhone) return;

        if(myPhone === ADMIN_PH) {
            isAdmin = true;
            initChat();
        } else {
            switchScr('wait-scr');
            channel.publish('join_req', { name: myName, phone: myPhone });
        }
    }

    function initChat() {
        switchScr('chat-scr');
        document.getElementById('pfp').innerText = myName[0].toUpperCase();
        channel.subscribe('msg_stream', (m) => render(m.data));
        channel.subscribe('admin_cmd', (m) => {
            if(m.data.target === myPhone && m.data.action === 'block') {
                localStorage.setItem('auro_block', 'true');
                location.reload();
            }
        });

        if(isAdmin) {
            channel.subscribe('join_req', (m) => {
                const div = document.createElement('div');
                div.className = 'bg-info text-dark p-2 rounded-3 mb-2 d-flex justify-content-between align-items-center fw-bold';
                div.innerHTML = `${m.data.name} wants in <button class="btn btn-sm btn-dark" onclick="approve('${m.data.phone}')">OK</button>`;
                document.getElementById('admin-notify').appendChild(div);
            });
        }
    }

    channel.subscribe('join_res', (m) => {
        if(m.data.phone === myPhone && m.data.status === 'ok') initChat();
    });

    function approve(ph) {
        channel.publish('join_res', { phone: ph, status: 'ok' });
        event.target.parentElement.remove();
    }

    function block(ph) {
        if(confirm("Block this user?")) channel.publish('admin_cmd', { target: ph, action: 'block' });
    }

    function sendTxt() {
        const t = document.getElementById('msg-in').value;
        if(!t.trim()) return;
        channel.publish('msg_stream', { user: myName, phone: myPhone, text: t, type: 'txt', admin: isAdmin });
        document.getElementById('msg-in').value = '';
    }

    function sendImg(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 400; canvas.height = img.height * (400/img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, 400, canvas.height);
                channel.publish('msg_stream', { user: myName, phone: myPhone, img: canvas.toDataURL('image/jpeg', 0.5), type: 'img', admin: isAdmin });
            };
        };
        reader.readAsDataURL(file);
    }

    function render(data) {
        const flow = document.getElementById('msg-flow');
        const isMe = data.phone === myPhone;
        const div = document.createElement('div');
        div.className = `bubble ${isMe ? 'sent' : 'recv'}`;
        
        const blockBtn = (isAdmin && !isMe) ? `<i class="bi bi-slash-circle-fill ms-2 btn-block" onclick="block('${data.phone}')"></i>` : "";
        const content = data.type === 'img' ? `<img src="${data.img}" class="w-100 rounded-3 mt-1">` : data.text;
        
        div.innerHTML = `<div style="font-size:10px; opacity:0.7;">${data.user} ${data.admin?'(Admin)':''} ${blockBtn}</div>${content}`;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
