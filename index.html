<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AÜRÖ HUB</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9438/9438567.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9438/9438567.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --danger: #ff3b30; --dark: #1c1c1e; }
        body { margin: 0; height: 100vh; overflow: hidden; background: #f2f2f7; font-family: -apple-system, sans-serif; }
        .screen { height: 100vh; display: none; flex-direction: column; }
        .active { display: flex !important; }

        /* 🛡️ Warning Alert */
        .warning-msg { 
            background: #fff0f0; border: 2.5px solid var(--danger); 
            color: var(--danger); padding: 15px; border-radius: 20px; 
            margin: 12px 20px; text-align: center; font-weight: 900;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.15);
        }

        /* 💎 Admin Panel */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 85vh; z-index: 2000; display: none;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(30px); padding: 30px 20px;
            border-radius: 0 0 40px 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); overflow-y: auto;
        }

        .user-card {
            background: #fff; border-radius: 20px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee;
        }

        /* Chat UI */
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 82%; font-size: 15px; word-wrap: break-word; }
        .sent { background: var(--dark); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .recv { background: #fff; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .input-bar { 
            padding: 15px 20px; background: #fff; border-top: 1px solid #eee;
            display: flex; align-items: center; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .msg-in { flex: 1; background: #f2f2f7; border: none; border-radius: 25px; padding: 12px 20px; outline: none; }
        .chat-img { width: 100%; max-width: 280px; border-radius: 18px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div id="login-scr" class="screen active" style="align-items:center; justify-content:center;">
    <div class="bg-white p-5 rounded-5 shadow-lg text-center w-100" style="max-width: 360px;">
        <h1 class="fw-bold mb-4">AÜRÖ HUB</h1>
        <input type="text" id="uName" class="form-control mb-3 rounded-pill py-2" placeholder="Name">
        <input type="tel" id="uPh" class="form-control mb-4 rounded-pill py-2" placeholder="Phone">
        <button class="btn btn-dark w-100 rounded-pill py-2 fw-bold" onclick="login()">GO TO HUB</button>
    </div>
</div>

<div id="wait-scr" class="screen" style="align-items:center; justify-content:center;">
    <div class="text-center">
        <div class="spinner-border text-dark mb-4"></div>
        <h4 class="fw-bold">AWAITING ADMIN</h4>
    </div>
</div>

<div id="chat-scr" class="screen">
    <div id="admin-panel">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">COMMANDER HUB</h4>
            <i class="bi bi-x-circle-fill fs-2" onclick="toggleAdmin()"></i>
        </div>
        <div id="user-list"></div>
    </div>

    <div class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center sticky-top">
        <div class="d-flex align-items-center">
            <div id="pfp" class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fw-bold me-2" style="width:40px; height:40px;">?</div>
            <h6 class="fw-bold m-0">AÜRÖ HUB</h6>
        </div>
        <i class="bi bi-shield-shaded fs-3" onclick="toggleAdmin()"></i>
    </div>

    <div id="msg-flow"></div>

    <div class="input-bar">
        <label class="fs-2" style="cursor: pointer;"><i class="bi bi-plus-circle-fill"></i><input type="file" id="img-input" hidden accept="image/*" onchange="sendImg(this)"></label>
        <input type="text" id="msg-box" class="msg-in" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendTxt()">
        <div class="fs-2 text-dark" onclick="sendTxt()"><i class="bi bi-arrow-up-circle-fill"></i></div>
    </div>
</div>

<div id="block-scr" class="screen" style="align-items:center; justify-content:center; background:#fff;">
    <div class="text-center p-5">
        <i class="bi bi-slash-circle-fill text-danger" style="font-size: 100px;"></i>
        <h1 class="fw-bold mt-4">SERVER BANNED</h1>
    </div>
</div>

<script>
    const ADMIN_PH = "09672264454";
    let myName = "", myPhone = "", isAdmin = false;
    let users = new Map();

    const TOXIC = ["စောက်", "လိုး", "မင်းမေ", "ဖာ", "လီး", "ကောင်မ", "ငပိ", "ဂျင်း", "နွား", "ခွေး", "ပြည့်တန်ဆာ", "အမေလိုး", "နှမလိုး", "မအေလိုး", "ဖင်", "စောက်ပတ်", "လီးပဲ", "စောက်ရမ်း", "သေနာ", "ဂျပိုး", "မအေဘေး", "မအေလိုးမ", "နှမလိုးမ", "ဖင်လိုး", "ဖင်ခံ", "ဖာသည်", "ဖာခေါင်း", "ဖာမ", "လိုးမ", "လိုးပဲ", "စောက်ဖုတ်", "စောက်ထိုး", "စောက်ရူး", "စောက်တုံး"];

    const ably = new Ably.Realtime({ key: 'Nt4BVQ.HoIzUA:eXv4-B4_uJx-0PmEN1WDOQ4KMjreeEUe2_G6F5VObd8' });
    const channel = ably.channels.get('auro_v11_vercel');

    function switchScr(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleAdmin() {
        if(!isAdmin) return;
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    channel.subscribe('control_v11', (m) => {
        if(m.data.target === myPhone) {
            if(m.data.action === 'allow') launch();
            if(m.data.action === 'block') switchScr('block-scr');
        }
    });

    function login() {
        myName = document.getElementById('uName').value.trim();
        myPhone = document.getElementById('uPh').value.trim();
        if(!myName || !myPhone) return;

        if(myPhone === ADMIN_PH) { isAdmin = true; launch(); }
        else { switchScr('wait-scr'); channel.publish('join_req_v11', { name: myName, phone: myPhone }); }
    }

    function launch() {
        switchScr('chat-scr');
        document.getElementById('pfp').innerText = myName[0].toUpperCase();
        channel.subscribe('chat_v11', (m) => render(m.data));

        if(isAdmin) {
            channel.subscribe('join_req_v11', (m) => {
                users.set(m.data.phone, m.data.name);
                updateAdminUI();
            });
        }
    }

    function updateAdminUI() {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach((name, ph) => {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `<div><div class="fw-bold">${name}</div><small>${ph}</small></div>
            <div><button class="btn btn-dark btn-sm rounded-pill px-3" onclick="doCmd('${ph}', 'allow')">ALLOW</button>
            <button class="btn btn-danger btn-sm rounded-pill px-3 ms-1" onclick="doCmd('${ph}', 'block')">BLOCK</button></div>`;
            list.prepend(div);
        });
    }

    function doCmd(ph, act) {
        channel.publish('control_v11', { target: ph, action: act });
        if(act === 'block') { users.delete(ph); updateAdminUI(); }
    }

    function sendTxt() {
        let val = document.getElementById('msg-box').value;
        if(!val.trim()) return;

        if(!isAdmin) {
            if(TOXIC.some(w => val.includes(w))) {
                channel.publish('control_v11', { target: myPhone, action: 'block' });
                return;
            }
        }

        let type = (isAdmin && val.startsWith('!')) ? 'warn' : 'txt';
        if(type === 'warn') val = val.substring(1);

        channel.publish('chat_v11', { user: myName, phone: myPhone, text: val, type: type, admin: isAdmin });
        document.getElementById('msg-box').value = '';
    }

    function sendImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 600; canvas.height = img.height * (600/img.width);
                ctx.fillStyle = "#fff"; ctx.fillRect(0,0,600,canvas.height);
                ctx.drawImage(img, 0, 0, 600, canvas.height);
                channel.publish('chat_v11', { user: myName, phone: myPhone, img: canvas.toDataURL('image/jpeg', 0.6), type: 'img', admin: isAdmin });
            };
        };
        reader.readAsDataURL(file);
    }

    function render(data) {
        const flow = document.getElementById('msg-flow');
        const isMe = data.phone === myPhone;
        const div = document.createElement('div');
        if(data.type === 'warn') {
            div.className = 'warning-msg';
            div.innerHTML = `🛡️ ADMIN WARNING: <br> ${data.text}`;
        } else {
            div.className = `bubble shadow-sm ${isMe ? 'sent' : 'recv'}`;
            const content = data.type === 'img' ? `<img src="${data.img}" class="chat-img">` : data.text;
            div.innerHTML = `<small style="font-size:9px; opacity:0.6; display:block; font-weight:bold;">${data.user.toUpperCase()} ${data.admin ? '🛡️' : ''}</small>${content}`;
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
