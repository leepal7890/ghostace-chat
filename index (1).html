<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Moon Chat</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#0a0f2c,#081024);color:#fff;}
.login,.chat{height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:#111c4a;padding:30px;border-radius:20px;width:90%;max-width:340px;text-align:center;box-shadow:0 0 30px #3f6cff;}
.login-box h2{color:#8fb6ff;margin-bottom:20px;}
.login-box button{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(45deg,#2b6cff,#5fa2ff);color:#fff;font-size:16px;}
.chat{display:none;flex-direction:column;width:100%;max-width:500px;height:100vh;}
.header{background:linear-gradient(45deg,#2b6cff,#5fa2ff);padding:15px;text-align:center;font-weight:bold;}
.messages{flex:1;padding:12px;overflow-y:auto;}
.msg{max-width:75%;padding:10px 14px;margin:8px 0;border-radius:16px;background:#1c2a6b;}
.me{background:#2b6cff;margin-left:auto;}
.name{font-size:12px;opacity:.7;}
.del{font-size:12px;color:#ff8a8a;cursor:pointer;margin-left:6px;}
.input{display:flex;padding:10px;background:#111c4a;}
.input input{flex:1;padding:10px;border-radius:20px;border:none;background:#1c2a6b;color:#fff;}
.input button{margin-left:8px;padding:10px 16px;border:none;border-radius:50%;background:#2b6cff;color:#fff;}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login" id="login">
  <div class="login-box">
    <h2>🌙 Blue Moon Chat</h2>
    <button onclick="login()">Sign in with Google</button>
  </div>
</div>

<!-- Chat Screen -->
<div class="chat" id="chat">
  <div class="header">🌙 Blue Moon Chat</div>
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="text" placeholder="Type message...">
    <button onclick="sendMessageUI()">➤</button>
  </div>
</div>

<!-- Firebase v9+ Modular CDN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

// 🔴 Firebase Config (အစားထိုးပြီးသား)
const firebaseConfig = {
  apiKey: "AIzaSyCmp85R6x9pogGsNFjCdXlgr4B5qP1sDrU",
  authDomain: "blue-moon-2a332.firebaseapp.com",
  databaseURL: "https://blue-moon-2a332-default-rtdb.firebaseio.com",
  projectId: "blue-moon-2a332",
  storageBucket: "blue-moon-2a332.firebasestorage.app",
  messagingSenderId: "848687159869",
  appId: "1:848687159869:web:29b3ef4dc1807dd3bca854",
  measurementId: "G-C1EFB5YR5X"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const auth = getAuth();

// Admin Email
const ADMIN_EMAIL = "thoonnz8888@gmail.com";
let currentUser = "";
let isAdmin = false;

const dbRef = ref(database, "chat");
const messagesDiv = document.getElementById("messages");

// ----------------------
// Google Login
// ----------------------
window.login = function() {
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider).then(res => {
    currentUser = res.user.email;
    isAdmin = (currentUser === ADMIN_EMAIL);
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }).catch(err => {
    console.error(err);
    alert("Login failed: " + err.message);
  });
}

// ----------------------
// Send Message
// ----------------------
window.sendMessageUI = function() {
  const input = document.getElementById("text");
  const text = input.value.trim();
  if(!text || !currentUser) return;
  push(dbRef, { name: currentUser, text: text, admin: isAdmin });
  input.value = "";
}

// ----------------------
// Receive Messages
// ----------------------
onChildAdded(dbRef, snapshot => {
  const msg = snapshot.val();
  const key = snapshot.key;

  const div = document.createElement("div");
  div.className = "msg"+(msg.name===currentUser?" me":"");
  div.innerHTML = `<div class="name">${msg.name}${msg.admin?" (Admin)":""}</div>${msg.text}`;

  // Admin delete button
  if(isAdmin){
    const del = document.createElement("span");
    del.className="del";
    del.innerText=" 💺 ";
    del.onclick = ()=> remove(ref(database, "chat/"+key));
    div.appendChild(del);
  }

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
</script>

</body>
</html>
